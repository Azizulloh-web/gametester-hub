{% extends 'base.html' %}

{% block content %}
    <h1>Удалить игру?</h1>
    <p>Вы уверены, что хотите навсегда удалить игру <b>"{{ game.title }}"</b>? Это действие нельзя отменить.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn" style="background: #dc3545; color: white;">Да, удалить</button>
        <a href="{% url 'game_detail' pk=game.pk %}" class="btn" style="background: #6c757d; color: white;">Отмена</a>
    </form>
{% endblock %}
